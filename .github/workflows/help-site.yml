name: Deploy help site

on:
  push:
    branches:
      - main
    paths:
      - 'help-site/**'
      - 'src/config/**'
      - 'src/types/types.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/help-site.yml'
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only run one Pages deployment at a time; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build help site
        run: npm run help:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: help-site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
