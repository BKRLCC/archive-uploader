<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>File Browser</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body class="browser">
    <p><a href="index.html">← Main screen</a></p>

    <div id="no-root" style="display: none">
      <p id="empty-state">
        No root folder set. <a href="settings.html">Choose one in Settings →</a>
      </p>
    </div>

    <div id="browser" style="display: none">
      <div id="browser-left">
        <nav id="breadcrumb"></nav>
        <div id="populate-bar">
          <button id="populate-btn">📋 Update Files tab</button>
          <span id="populate-feedback"></span>
        </div>
        <ul id="file-list"></ul>
      </div>
      <div id="detail-panel">
        <div id="detail-inner">
          <img id="preview" alt="" />
          <p id="detail-name"></p>
          <p id="detail-type"></p>
          <table id="detail-meta">
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const EMOJI = {
        folder: "📁",
        image: "🖼️",
        audio: "🎵",
        video: "🎬",
        doc: "📄",
      };

      const IMAGE_EXTS = new Set(["jpg", "jpeg", "png", "gif", "webp"]);
      const AUDIO_EXTS = new Set(["mp3", "wav", "flac", "aac", "ogg", "m4a"]);
      const VIDEO_EXTS = new Set(["mp4", "mov", "avi", "mkv", "webm"]);

      const TYPE_LABELS = {
        jpg: "JPEG image",
        jpeg: "JPEG image",
        png: "PNG image",
        gif: "GIF image",
        webp: "WebP image",
        mp3: "MP3 audio",
        wav: "WAV audio",
        flac: "FLAC audio",
        aac: "AAC audio",
        ogg: "OGG audio",
        m4a: "M4A audio",
        mp4: "MP4 video",
        mov: "QuickTime video",
        avi: "AVI video",
        mkv: "MKV video",
        webm: "WebM video",
        pdf: "PDF document",
        txt: "Plain text",
        html: "HTML file",
        js: "JavaScript file",
        json: "JSON file",
        md: "Markdown file",
        xlsx: "Excel spreadsheet",
        docx: "Word document",
        pptx: "PowerPoint",
        zip: "ZIP archive",
        gz: "GZ archive",
      };

      function emojiFor(entry) {
        if (entry.isDirectory) return EMOJI.folder;
        if (IMAGE_EXTS.has(entry.ext)) return EMOJI.image;
        if (AUDIO_EXTS.has(entry.ext)) return EMOJI.audio;
        if (VIDEO_EXTS.has(entry.ext)) return EMOJI.video;
        return EMOJI.doc;
      }

      function typeLabel(entry) {
        if (entry.isDirectory) return "Folder";
        return (
          TYPE_LABELS[entry.ext] ||
          (entry.ext ? `${entry.ext.toUpperCase()} file` : "File")
        );
      }

      function formatSize(bytes) {
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
        if (bytes < 1024 * 1024 * 1024)
          return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
        return `${(bytes / 1024 / 1024 / 1024).toFixed(2)} GB`;
      }

      function formatDate(iso) {
        return new Date(iso).toLocaleString("en-GB", {
          day: "numeric",
          month: "long",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      let rootFolder = null;
      let currentPath = null;
      let selectedLi = null;

      function closePanel() {
        document.getElementById("detail-panel").classList.remove("open");
        if (selectedLi) {
          selectedLi.classList.remove("selected");
          selectedLi = null;
        }
      }

      async function openPanel(entry, filePath) {
        const preview = document.getElementById("preview");
        const detailName = document.getElementById("detail-name");
        const detailType = document.getElementById("detail-type");
        const tbody = document.querySelector("#detail-meta tbody");

        detailName.textContent = entry.name;
        detailType.textContent = "";
        tbody.innerHTML = "";
        preview.style.display = "none";
        preview.src = "";

        document.getElementById("detail-panel").classList.add("open");

        const info = await window.api.getFileInfo(filePath);
        const label = typeLabel(entry);
        const sizeStr = entry.isDirectory ? "" : ` · ${formatSize(info.size)}`;
        detailType.textContent = label + sizeStr;

        const addRow = (label, value) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td>${label}</td><td>${value}</td>`;
          tbody.appendChild(tr);
        };
        addRow("Created", formatDate(info.birthtime));
        addRow("Modified", formatDate(info.mtime));

        const isImage = IMAGE_EXTS.has(entry.ext);
        if (isImage) {
          const dimRow = document.createElement("tr");
          dimRow.innerHTML = `<td>Dimensions</td><td id="dim-value">—</td>`;
          tbody.appendChild(dimRow);

          preview.style.display = "block";
          preview.onload = () => {
            const cell = document.getElementById("dim-value");
            if (cell)
              cell.textContent = `${preview.naturalWidth} × ${preview.naturalHeight}`;
          };
          preview.src = `file://${filePath}`;
        }
      }

      async function navigateTo(folderPath) {
        closePanel();
        currentPath = folderPath;
        const entries = await window.api.listFolder(folderPath);
        renderBreadcrumb();
        renderList(entries);

        // Show the populate button only if this folder contains archive.xlsx
        const hasXlsx = entries.some(
          (e) => !e.isDirectory && e.name === "archive.xlsx",
        );
        const bar = document.getElementById("populate-bar");
        bar.classList.toggle("visible", hasXlsx);
        document.getElementById("populate-feedback").textContent = "";
      }

      function renderBreadcrumb() {
        const nav = document.getElementById("breadcrumb");
        nav.innerHTML = "";

        const rel = currentPath.slice(rootFolder.length);
        const parts = rel.split(/[\\/]/).filter(Boolean);

        const addSegment = (label, segPath) => {
          const span = document.createElement("span");
          span.textContent = label;
          if (segPath !== currentPath) {
            span.addEventListener("click", () => navigateTo(segPath));
          } else {
            span.style.cursor = "default";
            span.style.color = "inherit";
            span.style.textDecoration = "none";
          }
          nav.appendChild(span);
        };

        const addSep = () => {
          const sep = document.createElement("span");
          sep.className = "sep";
          sep.textContent = "›";
          nav.appendChild(sep);
        };

        addSegment("🏠 Home", rootFolder);
        let builtPath = rootFolder;
        for (const part of parts) {
          builtPath = builtPath + "/" + part;
          addSep();
          addSegment(part, builtPath);
        }
      }

      function renderList(entries) {
        const ul = document.getElementById("file-list");
        ul.innerHTML = "";

        if (entries.length === 0) {
          const li = document.createElement("li");
          li.textContent = "This folder is empty.";
          li.style.color = "#999";
          ul.appendChild(li);
          return;
        }

        for (const entry of entries) {
          const li = document.createElement("li");
          li.textContent = `${emojiFor(entry)}  ${entry.name}`;
          const filePath = currentPath + "/" + entry.name;

          if (entry.isDirectory) {
            li.classList.add("folder");
            li.addEventListener("dblclick", (e) => {
              e.stopPropagation();
              navigateTo(filePath);
            });
          }

          li.addEventListener("click", (e) => {
            e.stopPropagation();
            if (selectedLi) selectedLi.classList.remove("selected");
            selectedLi = li;
            li.classList.add("selected");
            openPanel(entry, filePath);
          });

          ul.appendChild(li);
        }
      }

      document
        .getElementById("populate-btn")
        .addEventListener("click", async (e) => {
          e.stopPropagation();
          const feedback = document.getElementById("populate-feedback");
          const btn = document.getElementById("populate-btn");
          btn.disabled = true;
          feedback.textContent = "Working…";
          try {
            const { count } = await window.api.populateFilesTab(
              currentPath,
              rootFolder,
            );
            feedback.textContent = `✓ Files tab updated (${count} file${count !== 1 ? "s" : ""})`;
          } catch (err) {
            feedback.textContent = `✗ ${err.message}`;
          } finally {
            btn.disabled = false;
          }
        });

      document.addEventListener("click", closePanel);
      document.getElementById("detail-panel").addEventListener("click", (e) => {
        e.stopPropagation();
      });

      (async () => {
        rootFolder = await window.api.getRootFolder();

        if (!rootFolder) {
          document.getElementById("no-root").style.display = "block";
          return;
        }

        document.getElementById("browser").style.display = "flex";
        navigateTo(rootFolder);
      })();
    </script>
  </body>
</html>
