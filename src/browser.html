<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>File Browser</title>
    <link rel="stylesheet" href="index.css" />
    <style>
      #breadcrumb {
        font-size: 0.9em;
        margin-bottom: 1em;
      }
      #breadcrumb span {
        cursor: pointer;
        color: #0070f3;
        text-decoration: underline;
      }
      #breadcrumb span:last-child {
        color: inherit;
        text-decoration: none;
        cursor: default;
      }
      #breadcrumb .sep {
        margin: 0 0.3em;
        cursor: default;
        color: inherit;
        text-decoration: none;
      }
      #browser {
        display: flex;
        align-items: flex-start;
        gap: 0;
      }
      #browser-left {
        flex: 1;
        min-width: 0;
      }
      #file-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      #file-list li {
        padding: 0.35em 0.5em;
        cursor: default;
        border-radius: 4px;
        user-select: none;
      }
      #file-list li.folder {
        cursor: pointer;
      }
      #file-list li:hover {
        background: rgba(0, 0, 0, 0.05);
      }
      #file-list li.selected {
        background: #0070f3;
        color: #fff;
      }
      #file-list li.selected:hover {
        background: #005ecf;
      }
      #empty-state {
        color: #666;
      }
      #detail-panel {
        width: 0;
        overflow: hidden;
        flex-shrink: 0;
        transition: width 0.2s ease;
        border-left: 1px solid transparent;
      }
      #detail-panel.open {
        width: 280px;
        border-left-color: rgba(0, 0, 0, 0.1);
      }
      #detail-inner {
        width: 280px;
        padding: 1em;
        box-sizing: border-box;
      }
      #preview {
        width: 100%;
        max-height: 200px;
        object-fit: contain;
        display: block;
        margin-bottom: 0.75em;
        border-radius: 4px;
        background: rgba(0, 0, 0, 0.04);
      }
      #detail-name {
        font-weight: bold;
        margin: 0 0 0.2em;
        word-break: break-word;
      }
      #detail-type {
        font-size: 0.85em;
        color: #555;
        margin: 0 0 0.75em;
      }
      #detail-meta {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.8em;
      }
      #detail-meta td {
        padding: 0.3em 0;
        vertical-align: top;
      }
      #detail-meta td:first-child {
        color: #888;
        width: 45%;
        padding-right: 0.5em;
      }
    </style>
  </head>
  <body>
    <p><a href="index.html">← Main screen</a></p>

    <div id="no-root" style="display: none">
      <p id="empty-state">
        No root folder set. <a href="settings.html">Choose one in Settings →</a>
      </p>
    </div>

    <div id="browser" style="display: none">
      <div id="browser-left">
        <nav id="breadcrumb"></nav>
        <ul id="file-list"></ul>
      </div>
      <div id="detail-panel">
        <div id="detail-inner">
          <img id="preview" alt="" />
          <p id="detail-name"></p>
          <p id="detail-type"></p>
          <table id="detail-meta">
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const EMOJI = {
        folder: "📁",
        image: "🖼️",
        audio: "🎵",
        video: "🎬",
        doc: "📄",
      };

      const IMAGE_EXTS = new Set(["jpg", "jpeg", "png", "gif", "webp"]);
      const AUDIO_EXTS = new Set(["mp3", "wav", "flac", "aac", "ogg", "m4a"]);
      const VIDEO_EXTS = new Set(["mp4", "mov", "avi", "mkv", "webm"]);

      const TYPE_LABELS = {
        jpg: "JPEG image",
        jpeg: "JPEG image",
        png: "PNG image",
        gif: "GIF image",
        webp: "WebP image",
        mp3: "MP3 audio",
        wav: "WAV audio",
        flac: "FLAC audio",
        aac: "AAC audio",
        ogg: "OGG audio",
        m4a: "M4A audio",
        mp4: "MP4 video",
        mov: "QuickTime video",
        avi: "AVI video",
        mkv: "MKV video",
        webm: "WebM video",
        pdf: "PDF document",
        txt: "Plain text",
        html: "HTML file",
        js: "JavaScript file",
        json: "JSON file",
        md: "Markdown file",
        xlsx: "Excel spreadsheet",
        docx: "Word document",
        pptx: "PowerPoint",
        zip: "ZIP archive",
        gz: "GZ archive",
      };

      function emojiFor(entry) {
        if (entry.isDirectory) return EMOJI.folder;
        if (IMAGE_EXTS.has(entry.ext)) return EMOJI.image;
        if (AUDIO_EXTS.has(entry.ext)) return EMOJI.audio;
        if (VIDEO_EXTS.has(entry.ext)) return EMOJI.video;
        return EMOJI.doc;
      }

      function typeLabel(entry) {
        if (entry.isDirectory) return "Folder";
        return (
          TYPE_LABELS[entry.ext] ||
          (entry.ext ? `${entry.ext.toUpperCase()} file` : "File")
        );
      }

      function formatSize(bytes) {
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
        if (bytes < 1024 * 1024 * 1024)
          return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
        return `${(bytes / 1024 / 1024 / 1024).toFixed(2)} GB`;
      }

      function formatDate(iso) {
        return new Date(iso).toLocaleString("en-GB", {
          day: "numeric",
          month: "long",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      let rootFolder = null;
      let currentPath = null;
      let selectedLi = null;

      function closePanel() {
        document.getElementById("detail-panel").classList.remove("open");
        if (selectedLi) {
          selectedLi.classList.remove("selected");
          selectedLi = null;
        }
      }

      async function openPanel(entry, filePath) {
        const preview = document.getElementById("preview");
        const detailName = document.getElementById("detail-name");
        const detailType = document.getElementById("detail-type");
        const tbody = document.querySelector("#detail-meta tbody");

        detailName.textContent = entry.name;
        detailType.textContent = "";
        tbody.innerHTML = "";
        preview.style.display = "none";
        preview.src = "";

        document.getElementById("detail-panel").classList.add("open");

        const info = await window.api.getFileInfo(filePath);
        const label = typeLabel(entry);
        const sizeStr = entry.isDirectory ? "" : ` · ${formatSize(info.size)}`;
        detailType.textContent = label + sizeStr;

        const addRow = (label, value) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td>${label}</td><td>${value}</td>`;
          tbody.appendChild(tr);
        };
        addRow("Created", formatDate(info.birthtime));
        addRow("Modified", formatDate(info.mtime));

        const isImage = IMAGE_EXTS.has(entry.ext);
        if (isImage) {
          const dimRow = document.createElement("tr");
          dimRow.innerHTML = `<td>Dimensions</td><td id="dim-value">—</td>`;
          tbody.appendChild(dimRow);

          preview.style.display = "block";
          preview.onload = () => {
            const cell = document.getElementById("dim-value");
            if (cell)
              cell.textContent = `${preview.naturalWidth} × ${preview.naturalHeight}`;
          };
          preview.src = `file://${filePath}`;
        }
      }

      async function navigateTo(folderPath) {
        closePanel();
        currentPath = folderPath;
        const entries = await window.api.listFolder(folderPath);
        renderBreadcrumb();
        renderList(entries);
      }

      function renderBreadcrumb() {
        const nav = document.getElementById("breadcrumb");
        nav.innerHTML = "";

        const rel = currentPath.slice(rootFolder.length);
        const parts = rel.split(/[\\/]/).filter(Boolean);

        const addSegment = (label, segPath) => {
          const span = document.createElement("span");
          span.textContent = label;
          if (segPath !== currentPath) {
            span.addEventListener("click", () => navigateTo(segPath));
          } else {
            span.style.cursor = "default";
            span.style.color = "inherit";
            span.style.textDecoration = "none";
          }
          nav.appendChild(span);
        };

        const addSep = () => {
          const sep = document.createElement("span");
          sep.className = "sep";
          sep.textContent = "›";
          nav.appendChild(sep);
        };

        addSegment("🏠 Home", rootFolder);
        let builtPath = rootFolder;
        for (const part of parts) {
          builtPath = builtPath + "/" + part;
          addSep();
          addSegment(part, builtPath);
        }
      }

      function renderList(entries) {
        const ul = document.getElementById("file-list");
        ul.innerHTML = "";

        if (entries.length === 0) {
          const li = document.createElement("li");
          li.textContent = "This folder is empty.";
          li.style.color = "#999";
          ul.appendChild(li);
          return;
        }

        for (const entry of entries) {
          const li = document.createElement("li");
          li.textContent = `${emojiFor(entry)}  ${entry.name}`;
          const filePath = currentPath + "/" + entry.name;

          if (entry.isDirectory) {
            li.classList.add("folder");
            li.addEventListener("dblclick", (e) => {
              e.stopPropagation();
              navigateTo(filePath);
            });
          }

          li.addEventListener("click", (e) => {
            e.stopPropagation();
            if (selectedLi) selectedLi.classList.remove("selected");
            selectedLi = li;
            li.classList.add("selected");
            openPanel(entry, filePath);
          });

          ul.appendChild(li);
        }
      }

      document.addEventListener("click", closePanel);
      document.getElementById("detail-panel").addEventListener("click", (e) => {
        e.stopPropagation();
      });

      (async () => {
        rootFolder = await window.api.getRootFolder();

        if (!rootFolder) {
          document.getElementById("no-root").style.display = "block";
          return;
        }

        document.getElementById("browser").style.display = "flex";
        navigateTo(rootFolder);
      })();
    </script>
  </body>
</html>
