<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Archive</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div id="error-state" style="display: none">
      <p>No folder specified. <a href="browser.html">← Back to browser</a></p>
    </div>

    <div id="main" style="display: none">
      <p id="back-link"><a href="browser.html">← Back to browser</a></p>
      <h1>⭐ Archive</h1>
      <p id="folder-path"></p>

      <section>
        <h2>Files tab</h2>
        <p>
          Populate or replace the <strong>Files</strong> sheet in
          <code>archive.xlsx</code> with the current contents of this folder.
        </p>
        <button id="populate-btn">Update Files tab</button>
        <span id="populate-feedback"></span>
      </section>

      <section>
        <h2>
          Items
          <button
            id="refresh-btn"
            style="font-size: 0.6em; vertical-align: middle"
          >
            ↻ Refresh from file
          </button>
        </h2>
        <div id="items-state"></div>
        <div id="items-area">
          <div id="items-table-wrap" style="overflow-x: auto"></div>
          <div id="edit-drawer">
            <div id="edit-drawer-inner">
              <h3 id="edit-drawer-title">Edit item</h3>
              <div id="edit-fields"></div>
              <div style="margin-top: 1em; display: flex; gap: 0.5em">
                <button id="edit-save-btn">Save</button>
                <button id="edit-cancel-btn">Cancel</button>
              </div>
              <p id="edit-feedback" style="font-size: 0.85em; color: #555"></p>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script>
      (async () => {
        const params = new URLSearchParams(window.location.search);
        const folder = params.get("folder");

        if (!folder) {
          document.getElementById("error-state").style.display = "block";
          return;
        }

        const rootFolder = await window.api.getRootFolder();
        const rel = folder.slice(rootFolder.length).replace(/^[\/]/, "");
        const parts = rel ? rel.split(/[\/]/) : [];
        const segments = ["🏠 Home", ...parts].join(" › ");
        document.getElementById("folder-path").textContent = segments;
        document.getElementById("main").style.display = "block";

        // Load Items tab
        const xlsxPath = folder + "/archive.xlsx";

        // Edit drawer state
        let currentHeaders = [];
        let editingRowIndex = null;
        let editingTr = null;

        function openDrawer(rowIndex, rowData, tr) {
          editingRowIndex = rowIndex;
          editingTr = tr;
          const fieldsEl = document.getElementById("edit-fields");
          fieldsEl.innerHTML = "";
          document.getElementById("edit-feedback").textContent = "";

          for (let i = 0; i < currentHeaders.length; i++) {
            const key = String(currentHeaders[i] ?? "");
            const val = String(rowData[i] ?? "");
            const isSystem = key.startsWith("@");

            const label = document.createElement("label");
            label.style.cssText =
              "display:block; margin-bottom:0.75em; font-size:0.85em";
            label.innerHTML = `<span style="color:#888">${key}</span><br>`;

            if (isSystem) {
              const span = document.createElement("span");
              span.textContent = val || "—";
              span.style.cssText = "color:#aaa; font-style:italic";
              label.appendChild(span);
            } else {
              const input = document.createElement("input");
              input.type = "text";
              input.value = val;
              input.dataset.key = key;
              input.style.cssText =
                "width:100%; box-sizing:border-box; padding:0.3em 0.4em";
              label.appendChild(input);
            }
            fieldsEl.appendChild(label);
          }
          document.getElementById("edit-drawer").classList.add("open");
        }

        function closeDrawer() {
          document.getElementById("edit-drawer").classList.remove("open");
          editingRowIndex = null;
          editingTr = null;
        }

        document
          .getElementById("edit-drawer")
          .addEventListener("click", (e) => e.stopPropagation());
        document
          .getElementById("edit-cancel-btn")
          .addEventListener("click", closeDrawer);
        document.addEventListener("click", closeDrawer);

        document
          .getElementById("edit-save-btn")
          .addEventListener("click", async () => {
            const feedback = document.getElementById("edit-feedback");
            const saveBtn = document.getElementById("edit-save-btn");
            saveBtn.disabled = true;
            feedback.textContent = "Saving…";

            const updatedValues = {};
            document
              .querySelectorAll("#edit-fields input[data-key]")
              .forEach((input) => {
                updatedValues[input.dataset.key] = input.value;
              });

            try {
              const updated = await window.api.updateSheetRow(
                xlsxPath,
                editingRowIndex,
                updatedValues,
              );

              // Update the table row in place for visible (non-@) columns
              const visibleIndices = currentHeaders
                .map((h, i) => ({ h, i }))
                .filter(({ h }) => !String(h ?? "").startsWith("@"))
                .map(({ i }) => i);

              const cells = editingTr.querySelectorAll("td.data-cell");
              visibleIndices.forEach((colIdx, cellIdx) => {
                const key = String(currentHeaders[colIdx] ?? "");
                if (cells[cellIdx])
                  cells[cellIdx].textContent = updated[key] ?? "";
              });

              closeDrawer();
            } catch (err) {
              feedback.textContent = `✗ ${err.message}`;
            } finally {
              saveBtn.disabled = false;
            }
          });

        async function loadItemsTable() {
          const stateEl = document.getElementById("items-state");
          const wrapEl = document.getElementById("items-table-wrap");
          stateEl.textContent = "";
          wrapEl.innerHTML = "";
          closeDrawer();

          const sheet = await window.api.readSheet(xlsxPath, "Items");

          if (!sheet) {
            stateEl.textContent = "No Items tab found in archive.xlsx.";
          } else if (sheet.headers.length === 0) {
            stateEl.textContent = "Items tab is empty.";
          } else {
            currentHeaders = sheet.headers;
            const visibleIndices = sheet.headers
              .map((h, i) => ({ h, i }))
              .filter(({ h }) => !String(h ?? "").startsWith("@"))
              .map(({ i }) => i);

            const table = document.createElement("table");
            table.className = "sheet-table";

            const thead = table.createTHead();
            const hRow = thead.insertRow();
            // Edit button column header
            hRow.insertCell().textContent = "";
            for (const i of visibleIndices) {
              const th = document.createElement("th");
              th.textContent = sheet.headers[i] ?? "";
              hRow.appendChild(th);
            }

            const tbody = table.createTBody();
            sheet.rows.forEach((row, rowIndex) => {
              const tr = tbody.insertRow();

              const editTd = tr.insertCell();
              editTd.style.cssText =
                "width:2em; text-align:center; cursor:pointer";
              editTd.textContent = "✏️";
              editTd.addEventListener("click", (e) => {
                e.stopPropagation();
                openDrawer(rowIndex, row, tr);
              });

              for (const i of visibleIndices) {
                const td = tr.insertCell();
                td.className = "data-cell";
                td.textContent = row[i] ?? "";
              }
            });

            wrapEl.appendChild(table);
          }
        }

        loadItemsTable();
        document
          .getElementById("refresh-btn")
          .addEventListener("click", loadItemsTable);

        document
          .getElementById("populate-btn")
          .addEventListener("click", async () => {
            const feedback = document.getElementById("populate-feedback");
            const btn = document.getElementById("populate-btn");
            btn.disabled = true;
            feedback.textContent = "Working…";
            try {
              const { count } = await window.api.populateFilesTab(
                folder,
                rootFolder,
              );
              feedback.textContent = `✓ Updated (${count} file${count !== 1 ? "s" : ""})`;
            } catch (err) {
              feedback.textContent = `✗ ${err.message}`;
            } finally {
              btn.disabled = false;
            }
          });
      })();
    </script>
  </body>
</html>
